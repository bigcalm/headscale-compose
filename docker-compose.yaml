services:
  headscale:
    image: headscale/headscale:${HS_VERSION}
    container_name: headscale
    restart: unless-stopped
    command: serve
    volumes:
      - ./headscale-config:/etc/headscale:ro
      - ./headscale-config/extra-records.json:/etc/headscale/extra-records.json:ro
      - headscale-data:/var/lib/headscale
    environment:
      - TZ=${TZ:-UTC}
    networks:
      - internal

  headscale-ui:
    image: ghcr.io/gurucomputing/headscale-ui:${UI_VERSION}
    container_name: headscale-ui
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:${CADDY_VERSION}
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:?err}
      - TZ=${TZ:-UTC}
    networks:
      - internal

volumes:
  headscale-data:
  caddy-data:
  caddy-config:

networks:
  internal:
    driver: bridge
